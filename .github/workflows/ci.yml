name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test (monorepo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # packages/foundry/lib/* are git submodules

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # ── Contracts ──
      - name: Foundry format check
        run: yarn foundry:format --check
      - name: Foundry tests
        run: yarn foundry:test

      # ── App ──
      - name: Lint
        run: yarn next:lint
      - name: Typecheck
        run: yarn next:check-types
      - name: Build
        run: yarn next:build

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
