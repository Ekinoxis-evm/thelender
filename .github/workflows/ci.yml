name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test (monorepo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive # packages/foundry/lib/* are git submodules

      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # ── Contracts ──
      - name: Foundry format check
        run: yarn foundry:format --check
      - name: Foundry tests
        run: yarn foundry:test

      # ── App ──
      - name: Lint
        run: yarn next:lint
      - name: Typecheck
        run: yarn next:check-types
      - name: Build
        run: yarn next:build

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Use the free gitleaks CLI directly. The gitleaks-action wrapper requires a
      # GITLEAKS_LICENSE for organization repos; the binary does not.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --source . --no-git --redact --no-banner --verbose
